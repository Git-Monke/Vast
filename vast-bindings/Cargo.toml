[package]
name = "vast-bindings"
version = "0.1.0"
edition = "2021"
description = "SpacetimeDB client bindings for the vast module (regenerate with spacetime generate)"

[lib]
# Generated by `spacetime generate` as `mod.rs` (do not rename to lib.rs without updating generate out-dir).
path = "src/mod.rs"
name = "vast_bindings"

[dependencies]
spacetimedb-sdk = { version = "2.1.*" }
